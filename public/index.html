<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Messenger</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 700px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .chat-header {
      background: #2563eb;
      color: white;
      padding: 16px 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .chat-controls {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-bottom: 1px solid #eee;
      background: #fafafa;
    }

    .chat-controls input {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .messages {
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      background: #f9fafb;
    }

    .message {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .message-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .sender {
      font-weight: bold;
      color: #1f2937;
    }

    .time {
      color: #6b7280;
      white-space: nowrap;
    }

    .content {
      font-size: 15px;
      color: #111827;
      word-wrap: break-word;
    }

    .composer {
      display: flex;
      gap: 10px;
      padding: 15px;
      border-top: 1px solid #eee;
      background: white;
    }

    .composer input {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
    }

    .composer button {
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    .composer button:hover {
      background: #1d4ed8;
    }

    .empty {
      text-align: center;
      color: #6b7280;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Simple Messenger</div>

    <div class="chat-controls">
      <input id="usernameInput" type="text" placeholder="Enter your name" />
    </div>

    <div id="messages" class="messages">
      <div class="empty">No messages yet</div>
    </div>

    <div class="composer">
      <input id="messageInput" type="text" placeholder="Type a message..." />
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script>
    const messagesDiv = document.getElementById("messages");
    const usernameInput = document.getElementById("usernameInput");
    const messageInput = document.getElementById("messageInput");
    const sendButton = document.getElementById("sendButton");

    function formatTime(dateString) {
      if (!dateString) return "";
      return new Date(dateString).toLocaleString();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function renderMessages(messages) {
      messagesDiv.innerHTML = "";

      if (!messages.length) {
        messagesDiv.innerHTML = '<div class="empty">No messages yet</div>';
        return;
      }

      messages.forEach((msg) => {
        const el = document.createElement("div");
        el.className = "message";
        el.innerHTML = `
          <div class="message-top">
            <span class="sender">${escapeHtml(msg.sender || "Anonymous")}</span>
            <span class="time">${escapeHtml(formatTime(msg.createdAt))}</span>
          </div>
          <div class="content">${escapeHtml(msg.content || "")}</div>
        `;
        messagesDiv.appendChild(el);
      });

      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function fetchMessages() {
      try {
        const res = await fetch("/messages");
        const data = await res.json();
        renderMessages(data);
      } catch (err) {
        console.error("Error fetching messages:", err);
      }
    }

    async function sendMessage() {
      const sender = usernameInput.value.trim() || "Anonymous";
      const content = messageInput.value.trim();

      if (!content) return;

      try {
        const res = await fetch("/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            sender,
            content,
            type: "text"
          })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        messageInput.value = "";
        await fetchMessages();
      } catch (err) {
        console.error("Error sending message:", err);
      }
    }

    sendButton.addEventListener("click", sendMessage);

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    fetchMessages();
    setInterval(fetchMessages, 2000);
  </script>
</body>
</html>
